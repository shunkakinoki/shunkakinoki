name: Rust
on: pull_request
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - uses: actions/cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: |
          rustup component add clippy
      - uses: actions-rs/cargo@v1
        with:
          command: update
      - uses: actions-rs/cargo@v1
        with:
          command: check
      # - uses: actions-rs/cargo@v1
      #   with:
      #     command: test
      - uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check
      - uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: -- -D warnings
