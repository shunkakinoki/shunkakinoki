name: Secrets
on:
  push:
    paths:
      - .github/workflows/secrets.yml
jobs:
  issue:
    runs-on: ubuntu-latest
    steps:
       - uses: google/secrets-sync-action@v1.4.1
         with:
           SECRETS: |
             ^DOCKER_*
           REPOSITORIES: |
             ^shunkakinoki/codespaces$
           DRY_RUN: true
           GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
         env:
           DOCKER_PASSWORD : ${{ secrets.DOCKER_PASSWORD }}
