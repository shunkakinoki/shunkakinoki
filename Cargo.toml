[package]
name = "shunkakinoki"
version ="4.29.1"
authors = ["Shun Kakinoki <shunkakinoki@gmail.com>"]
edition = "2018"
license = "MIT"
homepage = "https://github.com/shunkakinoki/shunkakinoki"
description = "shunkakinoki"
autobins = false
include = ["shunkakinoki/**/*", "Cargo.toml"]

[[bin]]
name = "shunkakinoki"
path = "shunkakinoki/main.rs"

[[test]]
name = "shunkakinoki"
path = "shunkakinoki/tests/main.rs"

[dependencies]
clap = "2.33.3"
self_update = "0.15"
webbrowser = "0.5.4"

[dev-dependencies]
semantic-release-rust = "1.0.0-alpha.6"
version-sync = "0.9"
